name: Windows Automation - .NET Tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Restore dependencies
        run: dotnet restore CalculatorTestAutomation.sln

      - name: Build project
        run: dotnet build --configuration Release CalculatorTestAutomation.sln

      - name: Run Tests
        run: dotnet test --no-build --configuration Release CalculatorTestAutomation.sln
        env:
          ALLURE_RESULTS_DIRECTORY: ./allure-results

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate ./allure-results --clean -o ./allure-report

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

  deploy:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4