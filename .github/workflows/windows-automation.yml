name: Windows Automation - .NET Tests

on:
  push:
    branches:
      - main  
      - develop
  pull_request:
    branches:
      - main  
      - develop
      
jobs:
  test:
    runs-on: self-hosted 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
           
      - name: Restore dependencies
        shell: C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -ExecutionPolicy Bypass -Command
        run: dotnet restore "C:\Users\menachem\RiderProjects\CalculatorTestAutomation\CalculatorTestAutomation\CalculatorTestAutomation.csproj"
      
      - name: Build project
        run: dotnet build --no-restore --configuration Release "C:\Users\menachem\RiderProjects\CalculatorTestAutomation\CalculatorTestAutomation.sln"
      
      - name: Run NUnit tests with Allure
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=detailed" "C:\Users\menachem\RiderProjects\CalculatorTestAutomation\CalculatorTestAutomation\bin\Release\net8.0\CalculatorTestAutomation.dll"
        env:
          ALLURE_RESULTS_DIRECTORY: "C:\\Users\\menachem\\RiderProjects\\CalculatorTestAutomation\\CalculatorTestAutomation\\bin\\Release\\net8.0\\allure-results"
      
      - name: Generate Allure Report
        if: always()
        shell: C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe -ExecutionPolicy Bypass -Command
        run: |
          allure generate bin\Release\net8.0\allure-results --clean -o ./allure-report
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/
            ./allure-results/
      
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report/