name: Windows Automation - .NET Tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Restore dependencies
        run: dotnet restore CalculatorTestAutomation.sln

      - name: Build project
        run: dotnet build --configuration Release CalculatorTestAutomation.sln

      - name: Run NUnit tests with Allure
        shell: powershell
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=detailed" CalculatorTestAutomation.sln
        env:
          ALLURE_RESULTS_DIRECTORY: ./CalculatorTestAutomation/bin/Release/net8.0/allure-results

      - name: Generate Allure Report
        if: always()
        shell: powershell
        run: |
          allure generate ./CalculatorTestAutomation/bin/Release/net8.0/allure-results --clean -o ./allure-report

      - name: Generate Allure Single HTML
        if: always()
        shell: powershell
        run: |
          allure generate ./CalculatorTestAutomation/bin/Release/net8.0/allure-results --clean --single-file -o ./allure-report

      - name: Upload Allure Report to GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
         name: allure-report 
         path: ./allure-report/index.html  

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/**

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4