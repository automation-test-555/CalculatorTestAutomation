name: Windows Automation - .NET Tests

on:
  push:
    branches:
      - main  
      - develop
  pull_request:
    branches:
      - main  
      - develop
      
jobs:
  test:
    runs-on: self-hosted 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
           
      - name: Restore dependencies
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: dotnet restore CalculatorTestAutomation.sln
      
      - name: Build project
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: dotnet build --no-restore --configuration Release CalculatorTestAutomation.sln
      
      - name: Check session
        run: query user
        shell: powershell

      - name: Run NUnit tests with Allure
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --logger "console;verbosity=detailed" CalculatorTestAutomation.sln
        env:
          ALLURE_RESULTS_DIRECTORY: ./CalculatorTestAutomation/bin/Release/net8.0/allure-results
      
      - name: Generate Allure Report
        if: always()
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: |
          allure generate ./CalculatorTestAutomation/bin/Release/net8.0/allure-results --clean -o ./allure-report
      
      - name: Generate Allure Single HTML
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: |
          allure generate ./CalculatorTestAutomation/bin/Release/net8.0/allure-results \ --clean \ --single-file  -o ./allure-report  

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/
            ./CalculatorTestAutomation/bin/Release/net8.0/allure-results/allure-report.html
      
      - name: Send email report
        if: always()
        shell: powershell -ExecutionPolicy Bypass -Command "{0}"
        run: powershell ./send-report.ps1     

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./allure-report/