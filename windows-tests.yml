name: Windows Desktop Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build

      - name: Run Tests
        run: dotnet test

      - name: Generate Allure Report
        run: allure generate allure-results -o allure-report --clean
